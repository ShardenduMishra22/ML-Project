services:
  postgres:
    image: postgres:16-alpine
    container_name: landrisk-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - landrisk-net

  redis:
    image: redis:7-alpine
    container_name: landrisk-redis
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - landrisk-net

  ml-service:
    build:
      context: ./ml-service-python
      dockerfile: Dockerfile
    container_name: landrisk-ml-service
    env_file:
      - .env
    environment:
      MODEL_PATH: /app/models/xgb_model.json
      PYTHONUNBUFFERED: "1"
    ports:
      - "${ML_SERVICE_PORT}:8000"
    volumes:
      - ml_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - landrisk-net

  backend:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: landrisk-backend
    env_file:
      - .env
    environment:
      BACKEND_PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ML_SERVICE_URL: ${ML_SERVICE_URL}
      KGIS_BASE_URL: ${KGIS_BASE_URL}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - landrisk-net

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}
    container_name: landrisk-frontend
    env_file:
      - .env
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - landrisk-net

networks:
  landrisk-net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  ml_models:
